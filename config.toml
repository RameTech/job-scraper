[scraper]
headless = true
timeout_ms = 30000
max_listings_per_run = 100

[search]
keywords = ["project manager", "event manager", "executive assistant", "graduate", "entry level"]
locations = ["London"]
sources = ["linkedin", "indeed"]

# ===========================================================================
# Hard filters — listings failing these are dropped entirely
# ===========================================================================
[filters]
sponsors_only = true
sponsors_csv = "data/sponsors.csv"
require_location = "London"
exclude_keywords = []

no_visa_phrases = [
    "no visa sponsorship",
    "cannot sponsor",
    "unable to sponsor",
    "does not offer sponsorship",
    "sponsorship is not available",
    "sponsorship not available",
    "no work permit",
    "must have the right to work",
    "must already have the right to work",
    "must be eligible to work in the uk",
    "no sponsorship will be provided",
    "we do not sponsor",
    "candidates must have right to work",
    "right to work in the uk is required",
]

# ===========================================================================
# Score 1 — Role Fit
# "Is this job the kind of role we are looking for?"
# ===========================================================================
[scoring.role_fit]
role_keywords  = ["project manager", "project management", "programme manager",
                  "event manager", "events manager", "event management", "events coordinator",
                  "executive assistant", "ea to"]
role_score     = 30

level_keywords = ["entry level", "entry-level", "graduate", "post-undergrad",
                  "junior", "trainee", "school leaver", "recent graduate", "no experience"]
level_score    = 20

# German is a strong differentiator for role search (rare requirement → less competition)
language_keywords = ["german", "deutsch", "german speaker", "german required",
                     "fluent in german", "native german"]
language_score    = 50

# ===========================================================================
# Score 2 — Visa Eligibility
# "Can this job actually be sponsored under the Skilled Worker visa?"
# Based on UK Skilled Worker visa rules (July 2025)
#   Standard threshold:      £41,700/yr
#   New entrant / graduate:  £33,400/yr
#   Absolute floor:          £25,000/yr
# ===========================================================================
[scoring.visa]
eligible_role_score       = 40   # SOC-eligible target role (PM / Events)
other_eligible_score      = 20   # Any other SOC-eligible role
salary_standard_score     = 30   # Salary >= £41,700
salary_new_entrant_score  = 15   # Salary >= £33,400 (graduate / under-26 only)
salary_below_floor_penalty = -20 # Salary < £25,000 — absolutely ineligible
ineligible_role_penalty   = -20  # Role SOC is not sponsorable (EA/PA)

# ===========================================================================
# Score 3 — Candidate Fit
# "How competitive is Martha Hartl's profile for this specific role?"
#
# Profile summary:
#   - BSc Economics / Socioeconomics, WU Wien (ongoing, new entrant rate applies)
#   - CRM: Salesforce (Rieder Facades), Egocentric (Philharmonie Salzburg)
#   - Client relations: 3 roles at Rieder Facades
#   - Events / arts sector: Philharmonie Salzburg internship
#   - EA / admin coordination: Rieder Facades Assistenz der GF
#   - Native German speaker, English B2
#   - No team management experience
#   - No 3+ years continuous experience
# ===========================================================================
[scoring.candidate]

# CRM tools — Martha has hands-on Salesforce and Egocentric experience
crm_keywords = ["crm", "salesforce", "hubspot", "dynamics", "client management system",
                 "zoho", "database management"]
crm_score = 20

# Client-facing work — her primary background
client_relations_keywords = ["client relations", "client management", "account management",
                              "relationship management", "stakeholder management",
                              "client services", "customer success", "customer relations",
                              "partner management", "client support", "account executive"]
client_relations_score = 20

# Admin and coordination — strong background from EA and working student roles
admin_coord_keywords = ["administrative", "coordination", "scheduling", "diary management",
                        "calendar management", "meeting preparation", "meeting coordination",
                        "office management", "executive support", "operations support",
                        "document management", "data entry", "filing", "correspondence"]
admin_coord_score = 15

# Events / arts / culture sector — Philharmonie experience is a real differentiator
sector_keywords = ["events", "event", "arts", "culture", "concert", "venue", "hospitality",
                   "entertainment", "theatre", "theater", "music", "philharmonic",
                   "gallery", "museum", "festival", "conference", "exhibition"]
sector_score = 20

# Data, reporting, MS Office — she has this from CRM work and research roles
data_reporting_keywords = ["data analysis", "reporting", "excel", "microsoft office",
                            "ms office", "analytics", "presentations", "powerpoint",
                            "data management", "market research", "competitive analysis"]
data_reporting_score = 10

# Degree relevance — Economics/Business degree signals
degree_relevance_keywords = ["economics", "business administration", "business degree",
                              "bachelor", "undergraduate", "degree required",
                              "management degree", "social science"]
degree_relevance_score = 10

# Penalty: job requires seniority Martha doesn't have
overqualified_keywords = ["minimum 3 years", "3+ years", "5+ years", "5 years experience",
                          "7+ years", "senior manager", "head of department",
                          "extensive experience", "proven track record of"]
overqualified_penalty = -20

# Penalty: job requires managing a team (no management experience on CV)
team_management_keywords = ["managing a team", "people management", "line management",
                             "team leader", "managing staff", "direct reports",
                             "managing direct reports", "managing junior staff"]
team_management_penalty = -15

[storage]
db_path = "data/jobs.db"
